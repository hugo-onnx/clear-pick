<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#061014" />
    <title>ClearPick is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #061014;
      }

      body {
        align-items: center;
        display: flex;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        margin: 0 auto;
        max-width: 520px;
      }

      img {
        border-radius: 18px;
        display: block;
        height: 72px;
        margin-bottom: 28px;
        width: 72px;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
        margin: 0;
      }

      p {
        color: #475569;
        font-size: 1rem;
        line-height: 1.7;
        margin: 20px 0 0;
      }

      a {
        background: linear-gradient(135deg, #0891b2, #f97316);
        border-radius: 999px;
        color: #fff;
        display: inline-flex;
        font-weight: 700;
        margin-top: 28px;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>You are offline.</h1>
      <p>
        ClearPick needs a connection for the first load or a fresh page. If you
        already opened the tool on this device, try going back to the app.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
